# Colors (Nord)

## Thesse are a workaround for contrast in opencode
[colors]
indexed_colors = [ { index=236, color= "#3b4252"}, { index=237, color= "#434c5e"}  ]

[terminal.shell]
program = "tmux"
args = ["new-session", "-A", "-s", "main"]

# Default colors
[colors.primary]
background = '#2E3440'
foreground = '#D8DEE9'

# Normal colors
[colors.normal]
black   = '#3B4252'
red     = '#BF616A'
green   = '#A3BE8C'
yellow  = '#EBCB8B'
blue    = '#81A1C1'
magenta = '#B48EAD'
cyan    = '#88C0D0'
white   = '#E5E9F0'


# Bright colors
[colors.bright]
black   = '#4C566A'
red     = '#BF616A'
green   = '#A3BE8C'
yellow  = '#EBCB8B'
blue    = '#81A1C1'
magenta = '#B48EAD'
cyan    = '#8FBCBB'
white   = '#ECEFF4'

[font]
size = 11.0

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"

[window]
decorations = "Buttonless"
startup_mode = "Maximized"

[window.padding]
x = 6
y = 6

[[hints.enabled]]
# command = "xdg-open" # On Linux/BSD
# command = { program = "cmd", args = [ "/c", "start", "" ] } # On Windows
command = "open"
hyperlinks = true
post_processing = true
persist = false
mouse.enabled = true
binding = { key = "O", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[[hints.enabled]]
command = { program = "/Users/cararo/.dotfiles/.bin/open-in-code" }
mouse = { enabled = true, mods = "Command|Shift" }
binding = { key = "f", mods = "Command|Shift" }
regex = '(\.?([(file://)~\/])?[-a-zA-Z0-9_+-,.\/@\[\]]+)(?:(?::|", line )(\d+))?'

[[hints.enabled]]
command = { program = "/Users/cararo/.dotfiles/.bin/send-to-editor" }
mouse = { enabled = true, mods = "Control|Shift" }
binding = { key = "f", mods = "Control|Shift" }
regex = '(\.?([(file://)~\/])?[-a-zA-Z0-9_+-,.\/@\[\]]+)(?:(?::|", line )(\d+))?'
